<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bg)" rx="0"/>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" font-size="28" font-weight="700" fill="#1e293b">AI Paradigm Evolution</text>
  <text x="600" y="72" text-anchor="middle" font-size="14" fill="#64748b">From Rule-Based Automation to Autonomous Agents</text>

  <!-- Evolution arrow at bottom -->
  <line x1="80" y1="560" x2="1120" y2="560" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <text x="600" y="585" text-anchor="middle" font-size="13" fill="#94a3b8" font-style="italic">Increasing Autonomy &amp; Intelligence</text>

  <!-- ==================== Column 1: Process Automation ==================== -->
  <g transform="translate(35, 95)">
    <!-- Header -->
    <rect width="260" height="44" rx="8" fill="#475569" filter="url(#shadow)"/>
    <text x="130" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="white">Process Automation</text>

    <!-- Flow -->
    <!-- Input boxes -->
    <rect x="15" y="70" width="105" height="50" rx="8" fill="white" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="67" y="92" text-anchor="middle" font-size="12" fill="#475569" font-weight="500">Process</text>
    <text x="67" y="107" text-anchor="middle" font-size="12" fill="#475569" font-weight="500">Workflow</text>

    <rect x="140" y="70" width="105" height="50" rx="8" fill="white" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="192" y="99" text-anchor="middle" font-size="12" fill="#475569" font-weight="500">Data</text>

    <!-- Arrows down -->
    <line x1="67" y1="120" x2="67" y2="155" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
    <line x1="192" y1="120" x2="192" y2="155" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

    <!-- Merge point -->
    <line x1="67" y1="160" x2="130" y2="185" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="192" y1="160" x2="130" y2="185" stroke="#94a3b8" stroke-width="1.5"/>

    <!-- Core box -->
    <rect x="40" y="185" width="180" height="55" rx="10" fill="#475569" filter="url(#shadow)"/>
    <text x="130" y="210" text-anchor="middle" font-size="13" fill="white" font-weight="500">if/else Rules</text>
    <text x="130" y="228" text-anchor="middle" font-size="11" fill="#cbd5e1">Deterministic Logic</text>

    <!-- Arrow down -->
    <line x1="130" y1="240" x2="130" y2="280" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

    <!-- Output -->
    <rect x="30" y="280" width="200" height="50" rx="10" fill="#334155" filter="url(#shadow)"/>
    <text x="130" y="302" text-anchor="middle" font-size="13" fill="white" font-weight="600">Automation Script</text>
    <text x="130" y="318" text-anchor="middle" font-size="10" fill="#94a3b8">ETL, Cron Jobs, Airflow</text>

    <!-- Characteristics -->
    <rect x="15" y="355" width="230" height="90" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1" opacity="0.9"/>
    <text x="130" y="378" text-anchor="middle" font-size="11" fill="#64748b">Predefined rules</text>
    <text x="130" y="396" text-anchor="middle" font-size="11" fill="#64748b">No learning capability</text>
    <text x="130" y="414" text-anchor="middle" font-size="11" fill="#64748b">Handles repetitive tasks</text>
    <text x="130" y="432" text-anchor="middle" font-size="11" fill="#64748b">Brittle to changes</text>
  </g>

  <!-- ==================== Column 2: Supervised AI/ML ==================== -->
  <g transform="translate(320, 95)">
    <!-- Header -->
    <rect width="260" height="44" rx="8" fill="#2563eb" filter="url(#shadow)"/>
    <text x="130" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="white">Supervised AI / ML</text>

    <!-- Input -->
    <rect x="55" y="70" width="150" height="50" rx="8" fill="white" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="130" y="92" text-anchor="middle" font-size="12" fill="#2563eb" font-weight="500">Training</text>
    <text x="130" y="107" text-anchor="middle" font-size="12" fill="#2563eb" font-weight="500">Dataset</text>

    <!-- Arrow -->
    <line x1="130" y1="120" x2="130" y2="155" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

    <!-- Core -->
    <rect x="40" y="155" width="180" height="55" rx="10" fill="#2563eb" filter="url(#shadow)"/>
    <text x="130" y="180" text-anchor="middle" font-size="13" fill="white" font-weight="500">ML Model</text>
    <text x="130" y="198" text-anchor="middle" font-size="11" fill="#bfdbfe">Train &amp; Optimize</text>

    <!-- Arrow -->
    <line x1="130" y1="210" x2="130" y2="250" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

    <!-- Output -->
    <rect x="30" y="250" width="200" height="80" rx="10" fill="#1e40af" filter="url(#shadow)"/>
    <text x="130" y="278" text-anchor="middle" font-size="13" fill="white" font-weight="600">Prediction</text>
    <text x="130" y="298" text-anchor="middle" font-size="13" fill="white" font-weight="600">Classification</text>
    <text x="130" y="318" text-anchor="middle" font-size="10" fill="#93c5fd">Anomaly Detection, Forecast</text>

    <!-- Characteristics -->
    <rect x="15" y="355" width="230" height="90" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1" opacity="0.9"/>
    <text x="130" y="378" text-anchor="middle" font-size="11" fill="#64748b">Learns from labeled data</text>
    <text x="130" y="396" text-anchor="middle" font-size="11" fill="#64748b">Single-task focused</text>
    <text x="130" y="414" text-anchor="middle" font-size="11" fill="#64748b">Requires retraining</text>
    <text x="130" y="432" text-anchor="middle" font-size="11" fill="#64748b">Pattern recognition</text>
  </g>

  <!-- ==================== Column 3: Generative AI ==================== -->
  <g transform="translate(605, 95)">
    <!-- Header -->
    <rect width="260" height="44" rx="8" fill="#7c3aed" filter="url(#shadow)"/>
    <text x="130" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="white">Generative AI</text>

    <!-- Input -->
    <rect x="55" y="70" width="150" height="50" rx="8" fill="white" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="130" y="99" text-anchor="middle" font-size="12" fill="#7c3aed" font-weight="500">Prompt</text>

    <!-- Arrow -->
    <line x1="130" y1="120" x2="130" y2="155" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

    <!-- Core -->
    <rect x="40" y="155" width="180" height="55" rx="10" fill="#7c3aed" filter="url(#shadow)"/>
    <text x="130" y="180" text-anchor="middle" font-size="13" fill="white" font-weight="500">LLM</text>
    <text x="130" y="198" text-anchor="middle" font-size="11" fill="#c4b5fd">Foundation Model</text>

    <!-- Arrow -->
    <line x1="130" y1="210" x2="130" y2="250" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

    <!-- Output -->
    <rect x="30" y="250" width="200" height="80" rx="10" fill="#5b21b6" filter="url(#shadow)"/>
    <text x="130" y="275" text-anchor="middle" font-size="13" fill="white" font-weight="600">Generate</text>
    <text x="130" y="295" text-anchor="middle" font-size="13" fill="white" font-weight="600">Text, Code, Images</text>
    <text x="130" y="318" text-anchor="middle" font-size="10" fill="#c4b5fd">Single-turn Response</text>

    <!-- Characteristics -->
    <rect x="15" y="355" width="230" height="90" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1" opacity="0.9"/>
    <text x="130" y="378" text-anchor="middle" font-size="11" fill="#64748b">Understands context</text>
    <text x="130" y="396" text-anchor="middle" font-size="11" fill="#64748b">Creative generation</text>
    <text x="130" y="414" text-anchor="middle" font-size="11" fill="#64748b">No persistent memory</text>
    <text x="130" y="432" text-anchor="middle" font-size="11" fill="#64748b">Reactive, not proactive</text>
  </g>

  <!-- ==================== Column 4: Agentic AI ==================== -->
  <g transform="translate(890, 95)">
    <!-- Header with highlight -->
    <rect x="-5" y="-5" width="270" height="460" rx="12" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="8,4" opacity="0.5"/>
    <rect width="260" height="44" rx="8" fill="#ea580c" filter="url(#shadow)"/>
    <text x="130" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="white">Agentic AI</text>

    <!-- Goal (top) -->
    <rect x="70" y="65" width="120" height="40" rx="20" fill="#ea580c" filter="url(#shadow)"/>
    <text x="130" y="90" text-anchor="middle" font-size="13" fill="white" font-weight="600">Goal</text>

    <!-- Arrow down to Plan -->
    <line x1="130" y1="105" x2="130" y2="125" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

    <!-- Plan -->
    <rect x="55" y="125" width="150" height="36" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="130" y="148" text-anchor="middle" font-size="12" fill="#ea580c" font-weight="600">Plan</text>

    <!-- Arrow to Act -->
    <line x1="130" y1="161" x2="130" y2="181" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

    <!-- Act (center, larger) -->
    <rect x="40" y="181" width="180" height="45" rx="10" fill="#ea580c" filter="url(#shadow)"/>
    <text x="130" y="208" text-anchor="middle" font-size="14" fill="white" font-weight="600">Act</text>

    <!-- Memory box (left side) -->
    <rect x="-30" y="140" width="60" height="120" rx="8" fill="#0ea5e9" filter="url(#shadow)"/>
    <text x="0" y="175" text-anchor="middle" font-size="10" fill="white" font-weight="600" transform="rotate(-90, 0, 200)">Memory</text>

    <!-- Memory arrows -->
    <line x1="30" y1="188" x2="40" y2="200" stroke="#0ea5e9" stroke-width="1.5"/>
    <line x1="40" y1="200" x2="30" y2="212" stroke="#0ea5e9" stroke-width="1.5"/>

    <!-- Data & Tools (right side) -->
    <rect x="235" y="130" width="70" height="40" rx="6" fill="#0ea5e9" filter="url(#shadow)"/>
    <text x="270" y="154" text-anchor="middle" font-size="10" fill="white" font-weight="500">Data</text>

    <rect x="235" y="180" width="70" height="40" rx="6" fill="#0ea5e9" filter="url(#shadow)"/>
    <text x="270" y="196" text-anchor="middle" font-size="10" fill="white" font-weight="500">Tools &amp;</text>
    <text x="270" y="210" text-anchor="middle" font-size="10" fill="white" font-weight="500">Systems</text>

    <!-- Right arrows -->
    <line x1="220" y1="195" x2="235" y2="195" stroke="#0ea5e9" stroke-width="1.5"/>
    <line x1="235" y1="150" x2="220" y2="165" stroke="#0ea5e9" stroke-width="1.5"/>

    <!-- Arrow to Reflect -->
    <line x1="130" y1="226" x2="130" y2="248" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

    <!-- Reflect -->
    <rect x="55" y="248" width="150" height="36" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="130" y="271" text-anchor="middle" font-size="12" fill="#ea580c" font-weight="600">Reflect</text>

    <!-- Feedback loop arrow (Reflect back to Plan) -->
    <path d="M 55,266 Q 20,266 20,200 Q 20,143 55,143" fill="none" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-gray)"/>
    <text x="6" y="208" text-anchor="middle" font-size="9" fill="#fb923c" font-style="italic" transform="rotate(-90, 6, 208)">iterate</text>

    <!-- Arrow to Response -->
    <line x1="130" y1="284" x2="130" y2="308" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

    <!-- Response -->
    <rect x="40" y="308" width="180" height="40" rx="10" fill="#9a3412" filter="url(#shadow)"/>
    <text x="130" y="333" text-anchor="middle" font-size="13" fill="white" font-weight="600">Response / Action</text>

    <!-- Characteristics -->
    <rect x="15" y="365" width="230" height="80" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1" opacity="0.9"/>
    <text x="130" y="386" text-anchor="middle" font-size="11" fill="#64748b" font-weight="600">Autonomous reasoning</text>
    <text x="130" y="404" text-anchor="middle" font-size="11" fill="#64748b" font-weight="600">Multi-step planning</text>
    <text x="130" y="422" text-anchor="middle" font-size="11" fill="#64748b" font-weight="600">Tool use &amp; self-correction</text>
  </g>

  <!-- Divider lines between columns -->
  <line x1="310" y1="100" x2="310" y2="530" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="595" y1="100" x2="595" y2="530" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="880" y1="100" x2="880" y2="530" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="6,4"/>
</svg>