<script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
<script>
// Demo data
const DD={TSLA:{stock:{price:252.30,hi:488.54,lo:138.80,chg:"+12.3%",cap:"$805B"},news:["Tesla Q1 deliveries beat expectations at 495K","Elon Musk refocuses on Tesla after DOGE","FSD v13 regulatory approval in China","BYD surpasses Tesla global sales"],fin:{pe:65.2,fpe:48.5,rev:"$97.7B",margin:"13.0%"},rat:{mean:285,hi:450,lo:120,rec:"Hold",n:42},rpt:{trend:"短期承压，250-260震荡\n中长期：FSD利好，若Q2超预期可破300",risk:"• PE 65x 远超行业\n• BYD竞争加剧\n• Robotaxi延迟\n建议：分批建仓 ≤10%\n入场：$230-240",conf:68}},AAPL:{stock:{price:198.50,hi:237.49,lo:164.08,chg:"+5.1%",cap:"$3.04T"},news:["Vision Pro 2 rumored late 2026","iPhone 17 Air thinnest ever","Apple AI expands globally","Services revenue record high"],fin:{pe:31.2,fpe:28.5,rev:"$391B",margin:"26.3%"},rat:{mean:215,hi:260,lo:165,rec:"Buy",n:38},rpt:{trend:"$200压力明显\n中长期：AI+服务收入驱动增长",risk:"• 中国市场下滑\n• AI落后竞争对手\n• 硬件创新放缓\n建议：长期持有\n入场：$190-195",conf:78}},NVDA:{stock:{price:118.20,hi:153.13,lo:75.61,chg:"+18.7%",cap:"$2.89T"},news:["Blackwell GPUs record demand","AI infra spending to reach $1T","China export restrictions risk","Medical AI partnerships"],fin:{pe:52.8,fpe:32.1,rev:"$130B",margin:"55.8%"},rat:{mean:155,hi:200,lo:100,rec:"Strong Buy",n:48},rpt:{trend:"Blackwell需求超预期\n中长期：AI基建早期，3-5年高增长",risk:"• 中国出口管制\n• 大客户自研芯片\n• 估值含大量预期\n建议：逢低买入\n入场：$105-110",conf:82}}};

function dsl(t,c){const l=document.getElementById('demoLog');const d=document.createElement('div');d.style.cssText='padding:2px 0;color:'+(c||'#94a3b8');d.textContent='['+new Date().toLocaleTimeString()+'] '+t;l.appendChild(d);l.scrollTop=l.scrollHeight;}
function dss(n){for(let i=1;i<=5;i++){const e=document.getElementById('ds'+i);e.style.color=i<n?'#10b981':i===n?'#fbbf24':'#475569';e.style.background=i<n?'#052e16':i===n?'#292524':'#1e293b';e.style.border=i===n?'1px solid #f59e0b':'none';}}
function slp(ms){return new Promise(r=>setTimeout(r,ms));}

async function runDemo(){
  const sym=document.getElementById('demoSelect').value;
  const d=DD[sym];const btn=document.getElementById('demoBtn');
  btn.disabled=true;btn.textContent='⏳ 运行中...';
  // Reset
  document.getElementById('demoLog').innerHTML='';
  document.getElementById('demoVerify').style.display='none';
  document.getElementById('demoReport').style.display='none';
  for(let i=1;i<=4;i++){const e=document.getElementById('dt'+i);e.style.borderColor='#334155';document.getElementById('dt'+i+'s').textContent='待执行';document.getElementById('dt'+i+'s').style.color='#475569';document.getElementById('dt'+i+'d').style.display='none';document.getElementById('dt'+i+'p').style.width='0';}
  for(let i=1;i<=3;i++){document.getElementById('dv'+i).style.opacity='0';}

  // Step 1: Plan
  dss(1);dsl('📝 收到任务: 分析 '+sym,'#a78bfa');await slp(500);
  dsl('🗺️ 拆解为4个子任务:','#a78bfa');await slp(300);
  dsl('   1. get_stock_data → 行情','#64748b');await slp(200);
  dsl('   2. search_news → 新闻','#64748b');await slp(200);
  dsl('   3. get_financials → 财报','#64748b');await slp(200);
  dsl('   4. get_ratings → 评级','#64748b');await slp(500);

  // Step 2: Tools
  dss(2);
  const tools=[
    {i:1,name:'get_stock_data',color:'#3b82f6',delay:1000,data:'$'+d.stock.price+' | 30天:'+d.stock.chg+'<br>52周:$'+d.stock.lo+'~$'+d.stock.hi},
    {i:2,name:'search_news',color:'#8b5cf6',delay:1200,data:d.news.slice(0,2).map(n=>'• '+n.substring(0,35)+'...').join('<br>')},
    {i:3,name:'get_financials',color:'#10b981',delay:1000,data:'PE:'+d.fin.pe+'x | 营收:'+d.fin.rev+'<br>利润率:'+d.fin.margin},
    {i:4,name:'get_ratings',color:'#f59e0b',delay:900,data:'评级:<b>'+d.rat.rec+'</b> ('+d.rat.n+'人)<br>目标:$'+d.rat.lo+'~$'+d.rat.mean+'~$'+d.rat.hi}
  ];
  for(const t of tools){
    dsl('⚡ 调用 '+t.name+'("'+sym+'")...','#fbbf24');
    const el=document.getElementById('dt'+t.i);el.style.borderColor=t.color;
    document.getElementById('dt'+t.i+'s').textContent='🔄 执行中...';document.getElementById('dt'+t.i+'s').style.color='#fbbf24';
    document.getElementById('dt'+t.i+'p').style.width='100%';
    await slp(t.delay);
    document.getElementById('dt'+t.i+'s').textContent='✅ 完成';document.getElementById('dt'+t.i+'s').style.color='#10b981';
    document.getElementById('dt'+t.i+'d').innerHTML=t.data;document.getElementById('dt'+t.i+'d').style.display='block';
    dsl('   ✅ '+t.name+' 返回成功','#10b981');await slp(200);
  }
  await slp(400);

  // Step 3: Verify
  dss(3);document.getElementById('demoVerify').style.display='block';
  dsl('🔍 开始交叉验证...','#06b6d4');
  const checks=[
    {id:'dv1',txt:(d.stock.price<d.rat.mean?'✅':'⚠️')+' 股价$'+d.stock.price+' vs 目标$'+d.rat.mean+' → '+(d.stock.price<d.rat.mean?'有空间':'接近目标')},
    {id:'dv2',txt:(d.fin.pe<40?'✅':'⚠️')+' PE '+d.fin.pe+'x → '+(d.fin.pe<40?'估值合理':'估值偏高')},
    {id:'dv3',txt:'✅ '+d.rat.n+'位分析师共识: '+d.rat.rec}
  ];
  for(const c of checks){await slp(600);document.getElementById(c.id).textContent=c.txt;document.getElementById(c.id).style.opacity='1';dsl('   '+c.txt,'#06b6d4');}
  await slp(600);

  // Step 4: Reason
  dss(4);dsl('🧠 综合推理，生成报告...','#a78bfa');await slp(1500);

  // Step 5: Deliver
  dss(5);dsl('📋 报告生成完毕！','#10b981');
  document.getElementById('drSym').textContent=sym;
  document.getElementById('drTrend').textContent=d.rpt.trend;
  document.getElementById('drRisk').textContent=d.rpt.risk;
  document.getElementById('drConf').textContent=d.rpt.conf+'%';
  document.getElementById('demoReport').style.display='block';

  btn.disabled=false;btn.textContent='▶ 再来一次';
}

// 無用 platform logo (原图 with rounded frame)
const WUYONG_LOGO = `<img src="wuyong_logo.png" alt="無用" style="width:56px;height:56px;object-fit:contain;background:white;border-radius:10px;padding:4px;box-sizing:border-box;border:1px solid #334155;">`;

// Inject logo into every slide
document.querySelectorAll('.reveal .slides section').forEach(s => {
  const R = document.createElement('div');
  R.className = 'corner-logo right';
  R.innerHTML = WUYONG_LOGO;
  s.appendChild(R);
});

Reveal.initialize({
  hash: true,
  slideNumber: 'c/t',
  controls: true,
  progress: true,
  center: false,
  transition: 'slide',
  width: 1280,
  height: 720,
});
</script>
